---
# CIS - BENCHMARK ID: 2636 - 2641 cis: 5.1.2 - 5.1.7
- name: Harden cron file permissions
  ansible.builtin.file:
    name: "{{ item }}"
    owner: root
    group: root
    mode: og-rwx
  with_items:
    - /etc/crontab
    - /etc/cron.hourly
    - /etc/cron.daily
    - /etc/cron.weekly
    - /etc/cron.monthly

# CIS - BENCHMARK ID: 2641 cis: 5.1.7
- name: Harden cron job and ensure blacklist is removed
  ansible.builtin.file:
    name: "{{ item }}"
    state: absent
  with_items:
    - /etc/at.deny
    - /etc/cron.deny

# CIS - BENCHMARK ID: 2642 cis: 5.1.8
- name: Harden cron job file /etc/at.allow and ensure whitelist is present
  ansible.builtin.lineinfile:
    path: /etc/at.allow
    line: "root"
    state: present
    create: true
    owner: root
    group: root
    mode: 0640

- name: Harden cron job file /etc/cron.allow and ensure whitelist is present
  ansible.builtin.lineinfile:
    path: /etc/cron.allow
    line: "root"
    state: present
    create: true
    owner: root
    group: root
    mode: 0640
  when:
    - (groups['all'] | length == 1 and (enable_monitoring is undefined or enable_monitoring | lower not in [ "yes", "true" ])) or
      (groups['monitoring'] is defined and inventory_hostname not in groups['monitoring'])
