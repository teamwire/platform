---
- name: Restart registry
  ansible.builtin.command: "docker restart docker-registry"
  no_log: true

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart docker
  ansible.builtin.systemd:
    name: docker
    state: restarted
    daemon_reload: true

- name: Restart rsyslog
  ansible.builtin.service:
    name: rsyslog
    state: restarted

- name: Create local registry credentials
  ansible.builtin.command: "htpasswd -Bbc {{ registry_dir }}/htpasswd {{ local_registry_username }} {{ local_registry_password }}"
  no_log: true

# ------------------------------------------------------------------------------
# Update apt cache
# ------------------------------------------------------------------------------
- name: Update apt repositories and cache
  ansible.builtin.apt:
    update_cache: true
  when: not ansible_local.offline_mode.stat.exists
